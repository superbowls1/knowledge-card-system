<h1>Image Search</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="image">
    <button type="submit">Search by Image</button>
</form>

{% if cards %}
    {% for card in cards %}
        <h2>{{ card.title }}</h2>
        <p>{{ card.description }}</p>
        <img src="{{ card.image_url }}" width="200">
    {% endfor %}
{% endif %}
